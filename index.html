<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACD Spatial Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f8fc; --panel: #ffffff; --panel-2: #f0f4fa;
    --ink: #0c1f3f; --ink-2: #3a4b66; --ink-dim: #6b7892;
    --line: #e4eaf3; --line-bright: #d2dcea; --track: #e9eef6;
    --brand: #0034b7; --accent: #0aa2c0;
    --cat-competitor: #cf3b46; --cat-research: #5b53d6; --cat-funded: #1f9d57; --cat-own: #b4730a;
    --shadow: 0 1px 2px rgba(13,31,63,.05), 0 4px 18px rgba(13,31,63,.045);
    --shadow-lift: 0 2px 6px rgba(13,31,63,.07), 0 12px 30px rgba(13,31,63,.08);
    --whybg: #f3f6fc;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 40px 34px 90px; }
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  /* header */
  header.top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; padding-bottom: 24px; margin-bottom: 26px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; flex-direction: column; gap: 12px; }
  .logo { height: 46px; width: auto; }
  .logo svg { height: 100%; width: auto; display: block; }
  .brand h1 { font-weight: 800; font-size: 2.3rem; letter-spacing: -0.03em; line-height: 1; color: var(--ink); }
  .brand h1 .dot { color: var(--accent); }
  .brand p { font-family: var(--mono); color: var(--ink-dim); font-size: 0.72rem; margin-top: 7px; letter-spacing: 0.04em; text-transform: uppercase; }
  .headright { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .meta { text-align: right; font-family: var(--mono); font-size: 0.72rem; color: var(--ink-dim); line-height: 1.85; }
  .meta b { color: var(--ink); font-weight: 700; }
  .meta .live { color: var(--cat-funded); font-weight: 700; }
  .meta .live .pulse { display:inline-block; width:7px; height:7px; border-radius:50%; background: var(--cat-funded); margin-right:5px; vertical-align: middle; animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; position: relative; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s; }
  .stat:hover { box-shadow: var(--shadow-lift); transform: translateY(-2px); border-color: var(--line-bright); }
  .stat::after { content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--c); }
  .stat .n { font-family: var(--mono); font-weight: 700; font-size: 2rem; line-height: 1; color: var(--c); font-variant-numeric: tabular-nums; }
  .stat .lbl { font-family: var(--mono); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-dim); margin-top: 8px; }
  .stat .top { font-size: 0.78rem; color: var(--ink-2); margin-top: 8px; line-height: 1.4; height: 2.8em; overflow: hidden; }

  /* controls */
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 22px; }
  .chip { font-family: var(--mono); font-size: 0.74rem; background: var(--panel); border: 1px solid var(--line); color: var(--ink-2); padding: 9px 15px; border-radius: 999px; cursor: pointer; transition: all 0.15s; user-select: none; letter-spacing: 0.01em; box-shadow: var(--shadow); }
  .chip:hover { color: var(--ink); border-color: var(--line-bright); }
  .chip[aria-pressed="true"] { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 700; }
  .chip .cdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .spacer { flex: 1; }
  .search { background: var(--panel); border: 1px solid var(--line); color: var(--ink); padding: 10px 15px; border-radius: 9px; font-family: var(--mono); font-size: 0.76rem; min-width: 250px; box-shadow: var(--shadow); }
  .search::placeholder { color: var(--ink-dim); }
  .search:focus { outline: none; border-color: var(--accent); }
  .sortsel { background: var(--panel); border: 1px solid var(--line); color: var(--ink-2); padding: 10px 13px; border-radius: 9px; font-family: var(--mono); font-size: 0.72rem; cursor: pointer; box-shadow: var(--shadow); }

  /* feed */
  .feed { display: flex; flex-direction: column; gap: 14px; }
  .card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 22px 26px 22px 30px; display: grid; grid-template-columns: 108px 1fr; gap: 26px; align-items: start; box-shadow: var(--shadow); transition: transform 0.16s, box-shadow 0.16s, border-color 0.16s; opacity: 0; transform: translateY(10px); animation: rise 0.45s ease forwards; }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); border-color: var(--line-bright); }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: 16px 0 0 16px; background: var(--catcolor, var(--accent)); }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* score block */
  .scorebox { text-align: center; }
  .score { font-family: var(--mono); font-weight: 700; font-size: 2.5rem; line-height: 0.95; color: var(--catcolor, var(--accent)); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .score small { display: block; font-family: var(--mono); font-weight: 500; font-size: 0.52rem; color: var(--ink-dim); letter-spacing: 0.16em; margin-top: 6px; }
  .meter { height: 5px; border-radius: 3px; background: var(--track); margin-top: 11px; overflow: hidden; }
  .meter span { display:block; height:100%; background: var(--catcolor); border-radius:3px; }
  .subs { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .sub { display: flex; align-items: center; gap: 6px; }
  .sub .sl { font-family: var(--mono); font-size: 0.56rem; font-weight: 700; color: var(--ink-dim); width: 9px; text-align: left; }
  .sub .st { flex: 1; height: 5px; background: var(--track); border-radius: 3px; overflow: hidden; }
  .sub .st b { display: block; height: 100%; background: var(--catcolor); border-radius: 3px; }
  .fresh { font-family: var(--mono); font-size: 0.54rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 999px; margin-top: 12px; display: inline-block; }
  .f-new { background: #e4f6ec; color: #157a40; }
  .f-mid { background: #eaf0fb; color: #3c4a73; }
  .f-old { background: #f4efe3; color: #8a6d20; }

  /* body */
  .body .toprow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-family: var(--mono); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 3px 10px; border-radius: 6px; background: color-mix(in srgb, var(--catcolor) 12%, white); color: var(--catcolor); border: 1px solid color-mix(in srgb, var(--catcolor) 32%, white); }
  .src { font-family: var(--mono); font-size: 0.68rem; color: var(--ink-dim); }
  .terr { font-family: var(--mono); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 6px; background: var(--panel-2); color: var(--ink-2); border: 1px solid var(--line-bright); }
  .owner { font-family: var(--mono); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 6px; background: color-mix(in srgb, var(--brand) 9%, white); color: var(--brand); border: 1px solid color-mix(in srgb, var(--brand) 24%, white); }
  .date { font-family: var(--mono); font-size: 0.66rem; color: var(--ink-dim); margin-left: auto; }
  .body h2 { font-weight: 600; font-size: 1.22rem; line-height: 1.32; letter-spacing: -0.01em; margin-bottom: 10px; }
  .body h2 a { color: var(--ink); text-decoration: none; }
  .body h2 a:hover { color: var(--brand); text-decoration: underline; text-underline-offset: 3px; }
  .why { font-size: 0.94rem; color: var(--ink); background: var(--whybg); border-left: 3px solid var(--catcolor, var(--accent)); padding: 9px 15px; border-radius: 0 8px 8px 0; margin-bottom: 11px; }
  .summary { display: none; }
  .card.open .summary { display: block; margin-top: 10px; }
  .rawsum { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); color: var(--ink-dim); font-size: 0.8rem; }

  /* impact brief / outreach */
  .impact { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 15px 17px; margin-top: 4px; }
  .impact + .impact { margin-top: 10px; }
  .ib-label { font-family: var(--mono); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--catcolor, var(--accent)); margin-bottom: 10px; }
  .impact p { font-size: 0.88rem; color: var(--ink-2); margin-bottom: 8px; line-height: 1.5; }
  .impact p b { color: var(--ink); font-weight: 600; }
  .ib-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
  .ib-sub span { font-family: var(--mono); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
  .ib-sub ul { margin: 0; padding-left: 16px; }
  .ib-sub li { font-size: 0.82rem; color: var(--ink-2); margin-bottom: 4px; line-height: 1.42; }
  .ib-risk { border-left: 3px solid var(--cat-competitor); padding-left: 11px; }
  .ib-risk span { color: var(--cat-competitor); }
  .ib-hold { border-left: 3px solid var(--cat-funded); padding-left: 11px; }
  .ib-hold span { color: var(--cat-funded); }
  @media (max-width: 620px) { .ib-cols { grid-template-columns: 1fr; } }
  .expand { font-family: var(--mono); font-size: 0.66rem; font-weight: 500; color: var(--brand); cursor: pointer; background: none; border: none; padding: 6px 0 0; }
  .expand:hover { text-decoration: underline; text-underline-offset: 2px; }
  .draftwrap { margin: 4px 0 2px; }
  .draftbtn { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; color: #fff; background: var(--cat-funded); border: none; border-radius: 8px; padding: 7px 13px; cursor: pointer; letter-spacing: 0.02em; }
  .draftbtn:hover { filter: brightness(1.06); }
  .draftbtn.on { background: #176b3c; }
  .draftbox { margin-top: 10px; background: #f3f8f2; border: 1px solid #cfe6d4; border-radius: 12px; padding: 14px 16px; }
  .draftbox[hidden] { display: none; }
  .draftsub { font-family: var(--mono); font-size: 0.72rem; color: #27500a; font-weight: 700; margin-bottom: 8px; }
  .draftbody { font-size: 0.9rem; color: var(--ink); line-height: 1.55; }
  .copybtn { margin-top: 12px; font-family: var(--mono); font-size: 0.68rem; color: var(--cat-funded); background: #fff; border: 1px solid #cfe6d4; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .copybtn:hover { background: #eaf4ec; }

  .empty { text-align: center; color: var(--ink-dim); font-family: var(--mono); padding: 70px 0; font-size: 0.85rem; }
  footer { margin-top: 54px; text-align: center; font-family: var(--mono); font-size: 0.66rem; color: var(--ink-dim); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; } .card { opacity: 1; transform: none; } }
  @media (max-width: 980px) { .stats { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 620px) {
    .wrap { padding: 26px 16px 70px; }
    .card { grid-template-columns: 76px 1fr; gap: 16px; padding: 18px 18px 18px 22px; }
    .score { font-size: 1.95rem; }
    .brand h1 { font-size: 1.85rem; }
    .logo { height: 38px; }
    .meta { text-align: left; }
    .headright { align-items: flex-start; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo" id="logo" aria-label="Bio-Techne Spatial"></div>
      <div>
        <h1>Spatial Radar<span class="dot">.</span></h1>
        <p>Bio-Techne Spatial &middot; Field Intelligence</p>
      </div>
    </div>
    <div class="headright">
      <div class="meta">
        <div class="live"><span class="pulse" aria-hidden="true"></span> live feed</div>
        <div>updated <b id="updated">--</b></div>
        <div><b id="count">0</b> tracked &middot; <b id="newcount">0</b> new</div>
      </div>
    </div>
  </header>
  <section class="stats" id="stats" aria-label="Counts by category"></section>
  <div class="controls" role="group" aria-label="Filters">
    <button class="chip" data-cat="all" aria-pressed="true">All</button>
    <button class="chip" data-cat="Competitor Move" aria-pressed="false"><span class="cdot" style="background:var(--cat-competitor)" aria-hidden="true"></span>Competitor</button>
    <button class="chip" data-cat="Funded Lab" aria-pressed="false"><span class="cdot" style="background:var(--cat-funded)" aria-hidden="true"></span>Funded Lab</button>
    <button class="chip" data-cat="Research/Methods" aria-pressed="false"><span class="cdot" style="background:var(--cat-research)" aria-hidden="true"></span>Research</button>
    <div class="spacer"></div>
    <input class="search" id="search" placeholder="filter by keyword, PI, lab, territory..." aria-label="Search items">
    <select class="sortsel" id="region" aria-label="Region filter">
      <option value="all">region: all</option>
      <option value="East">East</option>
      <option value="West">West</option>
      <option value="National">National</option>
    </select>
    <select class="sortsel" id="sort" aria-label="Sort order">
      <option value="date">sort: newest</option>
      <option value="score">sort: score</option>
    </select>
  </div>
  <div class="feed" id="feed" aria-live="polite"></div>
  <footer>Spatial Radar &middot; refreshed each time the workflow runs</footer>
</div>

.68v-35.39h-5.68v35.39ZM318.74,144.12l-1.26,3.26-1.25-3.26h-.89v4.47h.73v-3.01l1.22,3.01h.4l1.2-3v3h.74v-4.47h-.9ZM311.39,144.82h1.24v3.77h.74v-3.77h1.24v-.7h-3.23v.7Z"/> </svg>`;
const CAT_COLOR = { "Competitor Move":"var(--cat-competitor)","Research/Methods":"var(--cat-research)","Funded Lab":"var(--cat-funded)" };
const CAT_SHORT = { "Funded Lab":"Funded","Competitor Move":"Competitor","Research/Methods":"Research" };
let DATA = { items: [], updated: "" };
let activeCat = "all";
function fmtDate(s){ if(!s) return ""; const d=new Date(s); return isNaN(d)?s:d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderStats(){
  const cats = ["Competitor Move","Funded Lab","Research/Methods"];
  document.getElementById("stats").innerHTML = cats.map(cat=>{
    const items = DATA.items.filter(i=>i.category===cat).sort((a,b)=>(b.score||0)-(a.score||0));
    const top = items[0];
    return `<div class="stat" data-cat="${cat}" style="--c:${CAT_COLOR[cat]}" role="button" tabindex="0" aria-label="${items.length} ${cat} items, filter">
      <div class="n">${items.length}</div><div class="lbl">${CAT_SHORT[cat]}</div>
      <div class="top">${top? "Top: "+esc(top.title).slice(0,52)+(top.title.length>52?"...":"") : "No items yet"}</div></div>`;
  }).join("");
  document.querySelectorAll(".stat").forEach(s=>{
    const go=()=>setCat(s.dataset.cat);
    s.addEventListener("click",go);
    s.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();go();} });
  });
}
function setCat(cat){ activeCat=cat; document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.cat===cat?"true":"false")); render(); }
function subbars(s){
  if(!s) return "";
  const bar=(lbl,v)=>{ const w=Math.max(0,Math.min(10,v||0))*10; return `<div class="sub"><span class="sl">${lbl}</span><span class="st"><b style="width:${w}%"></b></span></div>`; };
  return `<div class="subs" title="relevance / importance (0-10)">${bar("R",s.relevance)}${bar("I",s.importance)}</div>`;
}
function freshness(rf){
  if(rf==null) return "";
  if(rf>=0.9) return `<span class="fresh f-new" title="published recently">fresh</span>`;
  if(rf>=0.55) return `<span class="fresh f-mid" title="a few weeks old">recent</span>`;
  return `<span class="fresh f-old" title="older, fading in score">aging</span>`;
}
function render(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  const sortBy = document.getElementById("sort").value;
  const region = document.getElementById("region").value;
  let items = DATA.items.slice();
  if (activeCat!=="all") items = items.filter(i=>i.category===activeCat);
  if (region!=="all") items = items.filter(i=>(i.region||"National")===region);
  if (q) items = items.filter(i => (i.title||"").toLowerCase().includes(q)||(i.summary||"").toLowerCase().includes(q)||(i.why||"").toLowerCase().includes(q)||(i.pi||"").toLowerCase().includes(q)||(i.institution||"").toLowerCase().includes(q)||(i.territory||"").toLowerCase().includes(q));
  items.sort((a,b)=> sortBy==="date" ? new Date(b.date||0)-new Date(a.date||0) : (b.score||0)-(a.score||0));
  const feed = document.getElementById("feed");
  if(!items.length){ feed.innerHTML='<div class="empty">No items match these filters.</div>'; return; }
  feed.innerHTML = items.map((i,n)=>{
    const color = CAT_COLOR[i.category]||"var(--accent)";
    const brief = i.impact_brief ? impactBriefHTML(i.impact_brief) : "";
    const angle = i.outreach_angle ? outreachAngleHTML(i.outreach_angle) : "";
    const draft = (i.category==="Funded Lab" && i.outreach_angle && i.outreach_angle.draft_body) ? draftBlock(i.outreach_angle) : "";
    const has = (i.summary && i.summary.length>0) || brief || angle;
    return `<article class="card" style="--catcolor:${color}; animation-delay:${Math.min(n*0.035,0.5)}s">
      <div class="scorebox"><div class="score">${i.score??"--"}<small>SIGNAL</small></div>
      <div class="meter" aria-hidden="true"><span style="width:${Math.max(0,Math.min(100,i.score||0))}%"></span></div>${subbars(i.subscores)}${freshness(i.recency_factor)}</div>
      <div class="body"><div class="toprow"><span class="tag">${esc(i.category||"")}</span>${i.territory && i.territory!=="National" ? `<span class="terr">${esc(i.territory)}</span>`:""}${i.owner? `<span class="owner">${esc(i.owner)}</span>`:""}<span class="src">${esc(i.source||"")}</span><span class="date">${fmtDate(i.date)}</span></div>
      <h2><a href="${esc(i.link||"#")}" target="_blank" rel="noopener">${esc(i.title||"Untitled")}</a></h2>
      ${i.why? `<div class="why">${esc(i.why)}</div>`:""}
      ${draft}
      ${has? `<button class="expand" aria-expanded="false" onclick="const c=this.closest('.card');const o=c.classList.toggle('open');this.setAttribute('aria-expanded',o);this.textContent=o?'hide details \u25b4':'details \u25be'">details \u25be</button><div class="summary">${brief}${angle}${i.summary?`<div class="rawsum">${esc(i.summary)}</div>`:""}</div>`:""}
      </div></article>`;
  }).join("");
}

function draftBlock(a){
  const subj = a.draft_subject||"";
  const body = a.draft_body||"";
  const full = "Subject: "+subj+"\n\n"+body;
  return `<div class="draftwrap">
    <button class="draftbtn" onclick="toggleDraft(this)">\u2709 Draft outreach</button>
    <div class="draftbox" hidden>
      ${subj?`<div class="draftsub">Subject: ${esc(subj)}</div>`:""}
      <div class="draftbody">${esc(body).replace(/\n/g,"<br>")}</div>
      <button class="copybtn" data-text="${esc(full)}" onclick="copyDraft(this)">Copy email</button>
    </div>
  </div>`;
}
function toggleDraft(btn){
  const box = btn.parentNode.querySelector(".draftbox");
  if(!box) return;
  const show = box.hasAttribute("hidden");
  box.toggleAttribute("hidden", !show);
  btn.classList.toggle("on", show);
}
function copyDraft(btn){
  const t = btn.getAttribute("data-text")||"";
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>{ btn.textContent="Copied"; setTimeout(()=>btn.textContent="Copy email",1500); }).catch(()=>{ btn.textContent="Copy failed"; });
  } else { btn.textContent="Copy unavailable"; }
}

function outreachAngleHTML(a){
  if(!a) return "";
  return `<div class="impact">
    <div class="ib-label" style="color:var(--cat-funded)">Outreach Angle</div>
    ${a.hook?`<p><b>The hook.</b> ${esc(a.hook)}</p>`:""}
    ${a.way_in?`<p><b>Way in.</b> ${esc(a.way_in)}</p>`:""}
    ${a.routing?`<div class="ib-sub ib-hold" style="margin-top:8px"><span>Routing</span><div style="font-size:0.82rem;color:var(--ink-2)">${esc(a.routing)}</div></div>`:""}
  </div>`;
}

function impactBriefHTML(b){
  if(!b) return "";
  const list = arr => (arr||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  const atRisk = (b.at_risk&&b.at_risk.length)? `<div class="ib-sub ib-risk"><span>At risk</span><ul>${list(b.at_risk)}</ul></div>`:"";
  const hold = (b.holding_ground&&b.holding_ground.length)? `<div class="ib-sub ib-hold"><span>Holding ground</span><ul>${list(b.holding_ground)}</ul></div>`:"";
  return `<div class="impact">
    <div class="ib-label">Impact Brief</div>
    ${b.what_happened?`<p><b>What happened.</b> ${esc(b.what_happened)}</p>`:""}
    ${b.why_it_matters?`<p><b>Why it matters to ACD.</b> ${esc(b.why_it_matters)}</p>`:""}
    ${(atRisk||hold)?`<div class="ib-cols">${atRisk}${hold}</div>`:""}
  </div>`;
}
function boot(data){
  DATA = data;
  document.getElementById("updated").textContent = fmtDate(data.updated)||"--";
  document.getElementById("count").textContent = data.count ?? (data.items?data.items.length:0);
  document.getElementById("newcount").textContent = data.new_this_run ?? 0;
  renderStats();
  if(!DATA.items || !DATA.items.length){
    document.getElementById("feed").innerHTML='<div class="empty">No items yet. Run the workflow from the Actions tab to populate the radar.</div>';
    return;
  }
  render();
}
document.getElementById("logo").innerHTML = LOGO_COLOR;
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>setCat(c.dataset.cat)));
document.getElementById("search").addEventListener("input", render);
document.getElementById("region").addEventListener("change", render);
document.getElementById("sort").addEventListener("change", render);
fetch("data.json?"+Date.now()).then(r=>r.json()).then(boot).catch(()=>{ document.getElementById("feed").innerHTML='<div class="empty">Could not load data.json. If running locally, serve the folder over http rather than opening the file directly.</div>'; });
</script>
</body>
</html>
