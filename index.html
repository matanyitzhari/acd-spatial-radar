<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACD Spatial Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e12;
    --panel: #14171e;
    --panel-2: #1b1f29;
    --ink: #e8eaf0;
    --ink-dim: #8b91a3;
    --line: #2a2f3c;
    --accent: #4fd1c5;
    --cat-competitor: #ff5d73;
    --cat-research: #5b8def;
    --cat-funded: #3ddc84;
    --cat-own: #f5a623;
    --shadow: 0 18px 50px rgba(0,0,0,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% 0%, rgba(79,209,197,0.08), transparent 42%),
      radial-gradient(circle at 90% 8%, rgba(91,141,239,0.07), transparent 40%);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 38px 26px 80px; }

  header.top {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 18px; border-bottom: 1px solid var(--line);
    padding-bottom: 26px; margin-bottom: 30px;
  }
  .brand h1 {
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.7rem;
    letter-spacing: -0.02em; line-height: 1;
  }
  .brand h1 .dot { color: var(--accent); }
  .brand p {
    font-family: 'Space Mono', monospace; color: var(--ink-dim);
    font-size: 0.78rem; margin-top: 8px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .meta { text-align: right; font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--ink-dim); }
  .meta .pulse { color: var(--cat-funded); }
  .meta b { color: var(--ink); }

  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-bottom: 26px;
  }
  .chip {
    font-family: 'Space Mono', monospace; font-size: 0.74rem;
    background: var(--panel); border: 1px solid var(--line); color: var(--ink-dim);
    padding: 8px 14px; border-radius: 999px; cursor: pointer; transition: all 0.15s;
    user-select: none; letter-spacing: 0.02em;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-dim); }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); font-weight: 700; }
  .chip .cdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .spacer { flex: 1; }
  .search {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 14px; border-radius: 8px; font-family: 'Space Mono', monospace;
    font-size: 0.78rem; min-width: 200px;
  }
  .search:focus { outline: none; border-color: var(--accent); }
  .sortsel {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink-dim);
    padding: 9px 12px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 0.74rem; cursor: pointer;
  }

  .feed { display: flex; flex-direction: column; gap: 14px; }

  .card {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 20px 22px 20px 26px; display: grid;
    grid-template-columns: 76px 1fr; gap: 20px; align-items: start;
    transition: transform 0.14s, border-color 0.14s, background 0.14s;
    opacity: 0; animation: rise 0.5s ease forwards;
  }
  .card:hover { transform: translateY(-2px); border-color: #3a4150; background: var(--panel-2); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 14px 0 0 14px; background: var(--catcolor, var(--accent));
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .score {
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.4rem;
    line-height: 0.9; text-align: center; color: var(--catcolor, var(--accent));
  }
  .score small {
    display: block; font-family: 'Space Mono', monospace; font-weight: 400;
    font-size: 0.6rem; color: var(--ink-dim); letter-spacing: 0.12em; margin-top: 4px;
  }
  .body .toprow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 3px 9px; border-radius: 5px;
    background: color-mix(in srgb, var(--catcolor) 16%, transparent);
    color: var(--catcolor); border: 1px solid color-mix(in srgb, var(--catcolor) 35%, transparent);
  }
  .src { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--ink-dim); }
  .date { font-family: 'Space Mono', monospace; font-size: 0.66rem; color: var(--ink-dim); margin-left: auto; }
  .body h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.18rem;
    line-height: 1.3; letter-spacing: -0.01em; margin-bottom: 8px;
  }
  .body h2 a { color: var(--ink); text-decoration: none; }
  .body h2 a:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .why {
    font-size: 0.92rem; color: var(--ink); background: rgba(255,255,255,0.025);
    border-left: 2px solid var(--catcolor, var(--accent)); padding: 7px 12px;
    border-radius: 0 6px 6px 0; margin-bottom: 10px;
  }
  .summary { font-size: 0.82rem; color: var(--ink-dim); display: none; }
  .card.open .summary { display: block; margin-top: 8px; }
  .expand {
    font-family: 'Space Mono', monospace; font-size: 0.66rem; color: var(--accent);
    cursor: pointer; background: none; border: none; padding: 0; margin-top: 4px;
  }

  .empty { text-align: center; color: var(--ink-dim); font-family: 'Space Mono', monospace; padding: 60px 0; font-size: 0.85rem; }

  footer { margin-top: 50px; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.66rem; color: var(--ink-dim); }

  @media (max-width: 620px) {
    .card { grid-template-columns: 56px 1fr; gap: 14px; padding: 16px 16px 16px 20px; }
    .score { font-size: 1.8rem; }
    .brand h1 { font-size: 2rem; }
    .meta { text-align: left; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Spatial Radar<span class="dot">.</span></h1>
      <p>ACD / Bio-Techne Spatial &middot; Field Intelligence</p>
    </div>
    <div class="meta">
      <div><span class="pulse">&#9679;</span> live feed</div>
      <div>updated <b id="updated">--</b></div>
      <div><b id="count">0</b> items tracked</div>
    </div>
  </header>

  <div class="controls">
    <div class="chip active" data-cat="all">All</div>
    <div class="chip" data-cat="Funded Lab"><span class="cdot" style="background:var(--cat-funded)"></span>Funded Lab</div>
    <div class="chip" data-cat="Competitor Move"><span class="cdot" style="background:var(--cat-competitor)"></span>Competitor</div>
    <div class="chip" data-cat="Research/Methods"><span class="cdot" style="background:var(--cat-research)"></span>Research</div>
    <div class="chip" data-cat="Own/Bio-Techne"><span class="cdot" style="background:var(--cat-own)"></span>Own News</div>
    <div class="spacer"></div>
    <input class="search" id="search" placeholder="filter by keyword, PI, lab...">
    <select class="sortsel" id="sort">
      <option value="score">sort: score</option>
      <option value="date">sort: newest</option>
    </select>
  </div>

  <div class="feed" id="feed"></div>
  <footer>ACD Spatial Radar &middot; auto-refreshed by scheduled job &middot; no em dashes were harmed</footer>
</div>

<script>
const CAT_COLOR = {
  "Competitor Move": "var(--cat-competitor)",
  "Research/Methods": "var(--cat-research)",
  "Funded Lab": "var(--cat-funded)",
  "Own/Bio-Techne": "var(--cat-own)"
};
let DATA = { items: [], updated: "" };
let activeCat = "all";

function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const sortBy = document.getElementById("sort").value;
  let items = DATA.items.slice();

  if (activeCat !== "all") items = items.filter(i => i.category === activeCat);
  if (q) items = items.filter(i =>
    (i.title || "").toLowerCase().includes(q) ||
    (i.summary || "").toLowerCase().includes(q) ||
    (i.why || "").toLowerCase().includes(q) ||
    (i.pi || "").toLowerCase().includes(q) ||
    (i.institution || "").toLowerCase().includes(q)
  );
  items.sort((a, b) => sortBy === "date"
    ? new Date(b.date || 0) - new Date(a.date || 0)
    : (b.score || 0) - (a.score || 0));

  const feed = document.getElementById("feed");
  if (!items.length) { feed.innerHTML = '<div class="empty">no items match this filter</div>'; return; }

  feed.innerHTML = items.map((i, n) => {
    const color = CAT_COLOR[i.category] || "var(--accent)";
    const hasSummary = i.summary && i.summary.length > 0;
    return `
      <article class="card" style="--catcolor:${color}; animation-delay:${Math.min(n*0.04,0.6)}s">
        <div class="score">${i.score ?? "--"}<small>SIGNAL</small></div>
        <div class="body">
          <div class="toprow">
            <span class="tag">${i.category || ""}</span>
            <span class="src">${i.source || ""}</span>
            <span class="date">${fmtDate(i.date)}</span>
          </div>
          <h2><a href="${i.link || "#"}" target="_blank" rel="noopener">${i.title || "Untitled"}</a></h2>
          ${i.why ? `<div class="why">${i.why}</div>` : ""}
          ${hasSummary ? `<button class="expand" onclick="this.closest('.card').classList.toggle('open')">details &#9662;</button><div class="summary">${i.summary}</div>` : ""}
        </div>
      </article>`;
  }).join("");
}

function boot(data) {
  DATA = data;
  document.getElementById("updated").textContent = fmtDate(data.updated) || "--";
  document.getElementById("count").textContent = data.count ?? (data.items ? data.items.length : 0);
  render();
}

document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
  document.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
  c.classList.add("active");
  activeCat = c.dataset.cat;
  render();
}));
document.getElementById("search").addEventListener("input", render);
document.getElementById("sort").addEventListener("change", render);

fetch("data.json?" + Date.now())
  .then(r => r.json())
  .then(boot)
  .catch(() => {
    document.getElementById("feed").innerHTML =
      '<div class="empty">could not load data.json. If running locally, serve the folder over http rather than opening the file directly.</div>';
  });
</script>
</body>
</html>
