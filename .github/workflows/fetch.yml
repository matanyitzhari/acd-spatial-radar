name: Fetch and score spatial news

on:
  workflow_dispatch: {}   # manual only: run from the Actions tab.

  # TO RUN AUTOMATICALLY ONCE A DAY: remove the # from the three lines below.
  # Time is UTC. "0 11 * * *" is 11:00 UTC, which is about 6-7 AM US Eastern
  # (7 AM EDT in summer, 6 AM EST in winter). Adjust the hour if you want.
  # schedule:
  #   - cron: "0 11 * * *"

permissions:
  contents: write   # needed so the job can commit data.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run fetch and score
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python scripts/fetch_and_score.py

      - name: Commit updated data
        run: |
          git config user.name "spatial-radar-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update spatial news data [skip ci]"
            git push
          fi
